name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Quality gate: type check + build + audit ───────────────────────────────
  quality:
    name: Type check, build & audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check (svelte-check + tsc)
        run: npm run check

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high

  # ── E2E tests (Playwright / Chromium) ─────────────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    container:
      # Image tag must match @playwright/test version in package.json
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
      options: --ipc=host

    steps:
      - uses: actions/checkout@v6

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Deploy to GitHub Pages ─────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write
      contents: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute CalVer tag
        run: |
          BASE=$(date -u +"%Y.%m.%d")
          VERSION="$BASE"
          COUNTER=0
          while git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q .; do
            COUNTER=$((COUNTER + 1))
            VERSION="${BASE}.${COUNTER}"
          done
          echo "CALVER_TAG=${VERSION}" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build
        env:
          APP_VERSION: ${{ env.CALVER_TAG }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - uses: actions/deploy-pages@v4
        id: deploy

      - name: Tag release (CalVer YYYY.MM.DD)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            NOTES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges)
          fi
          [ -z "$NOTES" ] && NOTES="- Maintenance / dependency updates"

          gh release create "${{ env.CALVER_TAG }}" \
            --title "${{ env.CALVER_TAG }}" \
            --notes "$NOTES" \
            --latest
