name: Auto-update PR branches

on:
  push:
    branches: [main]

jobs:
  update:
    name: Merge main into open PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the merge commit to each PR branch
      pull-requests: write  # read PR list and update branches

    steps:
      - name: Update all open PR branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh pr list \
            --base main \
            --state open \
            --json number,isDraft \
            --jq '.[] | select(.isDraft == false) | .number' \
          | while read -r pr; do
              echo "Updating PR #$pr…"
              gh pr update-branch "$pr" --rebase \
                || echo "PR #$pr skipped (conflicts or already up to date)"
            done
