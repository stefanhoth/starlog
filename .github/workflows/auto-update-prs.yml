name: Auto-update PR branches

on:
  push:
    branches: [main]

jobs:
  update:
    name: Merge main into open PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the merge commit to each PR branch
      pull-requests: write  # read PR list and update branches

    steps:
      - name: Update oldest open PR branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Pick only the oldest non-draft PR — when it merges the workflow
          # fires again and advances the next one, draining the backlog
          # one at a time with no redundant rebases.
          PR=$(gh pr list \
            --base main \
            --state open \
            --json number,isDraft,createdAt \
            --jq '[.[] | select(.isDraft == false)] | sort_by(.createdAt) | first | .number')

          if [ -z "$PR" ]; then
            echo "No open PRs to update."
            exit 0
          fi

          echo "Updating PR #$PR…"
          gh pr update-branch "$PR" --rebase \
            || echo "PR #$PR skipped (conflicts or already up to date)"
